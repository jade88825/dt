# Render.com 部署配置
services:
  - type: web
    name: smart-traffic-platform
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r cloud_platform/requirements-deploy.txt
    startCommand: cd cloud_platform && python -m gunicorn app:app --timeout 120 --workers 1 --bind 0.0.0.0:$PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: FLASK_ENV
        value: production
      - key: RENDER
        value: "true"
